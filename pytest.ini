[pytest]
asyncio_mode = auto

# Without it, every async def test_* would need an explicit @pytest.mark.asyncio decorator,
# and pytest tests/ would silently skip them or error.

# Registered custom marks (avoids PytestUnknownMarkWarning)
markers =
    integration: marks tests that make real network / AWS API calls (deselect with -m "not integration")

# Exclude integration tests from the default run.
# Run them explicitly with:   pytest -m integration
addopts = -m "not integration"